name: push

on:
  push:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Docker Compose version
        run: docker compose version

      - name: Run tests in Docker Compose
        run: DOCKER_IMAGE=devops-for-developers-project-74 make ci

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build production image
        run: docker compose -f docker-compose.yml build app
        env:
          DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/devops-for-developers-project-74

      - name: Push latest image to Docker Hub
        run: docker compose -f docker-compose.yml push app
        env:
          DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/devops-for-developers-project-74
