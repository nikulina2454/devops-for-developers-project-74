name: push

on:
  push:

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/devops-for-developers-project-74
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show Docker Compose version
        run: docker-compose --version

      - name: Run tests in Docker Compose
        run: make ci

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build production image
        run: docker-compose -f docker-compose.yml build app

      - name: Push latest image to Docker Hub
        run: docker-compose -f docker-compose.yml push app
