services:
  app:
    build:
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
    volumes:
      - ./app:/app
    command: make dev
    ports:
      - "8080:8080"
  caddy:
    image: caddy:2
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./services/caddy/Caddyfile:/etc/caddy/Caddyfile
